services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hireflow-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  api:
    build:
      context: ./HireFlow.Api/HireFlow.Api
      dockerfile: Dockerfile
    container_name: hireflow-api
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=HireFlow;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=true"
      Authentication__Jwt__Key: ${JWT_KEY}
      Authentication__Jwt__Issuer: HireFlow
      Authentication__Jwt__Audience: HireFlow
      Authentication__Jwt__ExpiryMinutes: "60"
      Authentication__Google__ClientId: ${GOOGLE_CLIENT_ID}
      Authentication__Google__ClientSecret: ${GOOGLE_CLIENT_SECRET}
      Gemini__ApiKey: ${GEMINI_API_KEY}
      Gemini__Model: ${GEMINI_MODEL:-gemini-flash-latest}
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./hireflow
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
    container_name: hireflow-frontend
    depends_on:
      - api
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  sqlserver_data:
